name: underwrite

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-underwrite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-underwrite}
      POSTGRES_DB: ${POSTGRES_DB:-underwrite}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-underwrite} -d ${POSTGRES_DB:-underwrite}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  api:
    build:
      context: ./api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://underwrite:underwrite@db:5432/underwrite}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request as u,sys; sys.exit(0 if u.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

volumes:
  pgdata:
