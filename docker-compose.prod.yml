name: underwrite

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-underwrite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-underwrite}
      POSTGRES_DB: ${POSTGRES_DB:-underwrite}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-underwrite} -d ${POSTGRES_DB:-underwrite}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  api:
    image: ${API_IMAGE:?set API_IMAGE to the ECR tag to run}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://underwrite:underwrite@db:5432/underwrite}
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request as u,sys; sys.exit(0 if u.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - api
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN to the public hostname Caddy serves}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/static:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
