name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: api

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run --frozen ruff check .

      - name: ruff format
        run: uv run --frozen ruff format --check .

  test:
    name: test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: underwrite
          POSTGRES_PASSWORD: underwrite
          POSTGRES_DB: underwrite
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    env:
      DATABASE_URL: postgresql+asyncpg://underwrite:underwrite@localhost:5432/underwrite

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: pytest
        run: uv run --frozen pytest -q -m "not llm"
