name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run --frozen ruff check .

      - name: ruff format
        run: uv run --frozen ruff format --check .

  infra:
    name: infra
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.15.8

      - name: fmt
        run: terraform fmt -check -recursive

      - name: validate
        run: |
          terraform init -backend=false -input=false
          terraform validate

  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: underwrite
          POSTGRES_PASSWORD: underwrite
          POSTGRES_DB: underwrite
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    env:
      DATABASE_URL: postgresql+asyncpg://underwrite:underwrite@localhost:5432/underwrite

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - name: Install WeasyPrint system libs
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz-subset0 fonts-dejavu-core shared-mime-info

      - name: Install dependencies
        run: uv sync --frozen --group local-pdf

      - name: pytest
        run: uv run --frozen pytest -q -m "not llm"

  # The one context branch protection requires: job names change, and a
  # required check that never reports blocks the PR permanently.
  ci-ok:
    name: ci-ok
    if: always()
    needs: [lint, test, infra]
    runs-on: ubuntu-latest
    steps:
      - name: Verify every job succeeded
        env:
          LINT: ${{ needs.lint.result }}
          TEST: ${{ needs.test.result }}
          INFRA: ${{ needs.infra.result }}
        run: |
          echo "lint=$LINT test=$TEST infra=$INFRA"
          [ "$LINT" = "success" ] && [ "$TEST" = "success" ] && [ "$INFRA" = "success" ]
