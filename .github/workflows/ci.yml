name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run --frozen ruff check .

      - name: ruff format
        run: uv run --frozen ruff format --check .

  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: underwrite
          POSTGRES_PASSWORD: underwrite
          POSTGRES_DB: underwrite
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    env:
      DATABASE_URL: postgresql+asyncpg://underwrite:underwrite@localhost:5432/underwrite

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: pytest
        run: uv run --frozen pytest -q -m "not llm"

  # Single stable context for branch protection to require. Requiring lint and
  # test by name breaks whenever a job is renamed, a matrix is added, or a path
  # filter stops a job reporting — and a required check that never reports
  # blocks the PR forever with no timeout.
  ci-ok:
    name: ci-ok
    if: always()
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify every job succeeded
        env:
          LINT: ${{ needs.lint.result }}
          TEST: ${{ needs.test.result }}
        run: |
          echo "lint=$LINT test=$TEST"
          [ "$LINT" = "success" ] && [ "$TEST" = "success" ]
