<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Underwrite — Login mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:oklch(0.985 0.002 250); --surface:oklch(1 0 0); --surface-2:oklch(0.972 0.004 250);
    --border:oklch(0.918 0.005 250); --border-strong:oklch(0.855 0.006 250);
    --ink:oklch(0.235 0.012 260); --ink-muted:oklch(0.470 0.012 260); --ink-subtle:oklch(0.520 0.012 260);
    --accent:oklch(0.530 0.130 47); --accent-hover:oklch(0.480 0.130 45); --on-accent:oklch(0.995 0 0);
    --e-panel:0 1px 2px oklch(0.2 0.02 260 / .06);
  }
  :root[data-theme="dark"]{
    --bg:oklch(0.180 0.008 260); --surface:oklch(0.212 0.008 260); --surface-2:oklch(0.242 0.009 260);
    --border:oklch(0.300 0.010 260); --border-strong:oklch(0.380 0.012 260);
    --ink:oklch(0.950 0.004 260); --ink-muted:oklch(0.730 0.007 260); --ink-subtle:oklch(0.640 0.007 260);
    --accent:oklch(0.580 0.135 48); --accent-hover:oklch(0.640 0.135 50); --on-accent:oklch(0.170 0.010 260);
    --e-panel:0 1px 2px oklch(0 0 0 / .3);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:14px;
    min-height:100vh;display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased}
  .toggle{position:fixed;top:20px;right:20px;width:32px;height:32px;border:1px solid var(--border-strong);border-radius:6px;
    background:var(--surface);color:var(--ink-muted);display:grid;place-items:center;cursor:pointer}
  .panel{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:8px;
    box-shadow:var(--e-panel);padding:32px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:16px;letter-spacing:-.01em}
  .mark{width:24px;height:24px;border-radius:6px;background:var(--accent);position:relative}
  .mark::after{content:"";position:absolute;inset:7px 7px auto 7px;height:3px;border-radius:2px;background:var(--on-accent);box-shadow:0 5px 0 var(--on-accent)}
  .lead{margin-top:6px;color:var(--ink-muted);font-size:13px}
  label{display:block;margin-top:18px;font-size:13px;font-weight:500;color:var(--ink)}
  input{margin-top:6px;width:100%;height:38px;padding:0 12px;font-size:14px;font-family:inherit;color:var(--ink);
    background:var(--surface);border:1px solid var(--border-strong);border-radius:6px;outline:none}
  input::placeholder{color:var(--ink-subtle)}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px oklch(0.53 0.13 47 / .18)}
  .btn{margin-top:24px;width:100%;height:40px;border:0;border-radius:6px;background:var(--accent);color:var(--on-accent);
    font-size:14px;font-weight:500;font-family:inherit;cursor:pointer}
  .foot{margin-top:16px;font-size:12px;color:var(--ink-subtle);text-align:center}
</style>
</head>
<body>
  <button class="toggle" title="Toggle theme">◐</button>
  <form class="panel" onsubmit="return false">
    <div class="brand"><span class="mark"></span>Underwrite</div>
    <p class="lead">Sign in to the operator console.</p>
    <label>Username<input type="text" placeholder="you@insurer" autocomplete="username" /></label>
    <label>Password<input type="password" placeholder="••••••••" autocomplete="current-password" /></label>
    <button class="btn" type="submit">Sign in</button>
    <p class="foot">Tech E&amp;O / Cyber underwriting · rating v1.0</p>
  </form>
  <script>
    document.querySelector('.toggle').addEventListener('click',()=>{const r=document.documentElement;r.dataset.theme=r.dataset.theme==='dark'?'light':'dark';});
  </script>
</body>
</html>
